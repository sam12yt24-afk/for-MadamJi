<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- ========================================= -->
<!-- BACKGROUND -->
<!-- ========================================= -->

<div id="star-container"></div>

<div class="shooting-stars"></div>

<div class="overlay"></div>

<div class="moon">

<div class="crater crater1"></div>
<div class="crater crater2"></div>
<div class="crater crater3"></div>
<div class="crater crater4"></div>
<div class="crater crater5"></div>
<div class="crater crater6"></div>

</div>

<!-- ========================================= -->
<!-- MUSIC -->
<!-- ========================================= -->

<audio id="bgMusic" loop>

<source
src="music/Indila-Love-Story-Piano-Cover.mp3"
type="audio/mpeg">

</audio>

<!-- ========================================= -->
<!-- CHAPTER 1 -->
<!-- ========================================= -->

<section
id="chapter1"
class="chapter active">

<div class="container">

<h1 id="title"></h1>

<p id="subtitle"></p>

<button id="beginBtn">

Begin Journey ✨

</button>

</div>

</section>

<!-- ========================================= -->
<!-- CHAPTER 2 -->
<!-- ========================================= -->

<section
id="chapter2"
class="chapter">

<div class="chapter-container">

<h2 id="chapterTitle" style="font-family:'Great Vibes',cursive ; font-size:60px";></h2>

<div class="content">

<div class="text">

<p id="chapterText" ></p>

</div>

<div class="image">

<img

id="storyImage"

src="images/cat1.jpg"

alt="Memory"

>

</div>

</div>

<button id="continueBtn">

Turn the Page →

</button>

</div>

</section>

<section id="chapter3" class="chapter">

<div class="chapter-container">

<h2 id="chapter3Title" style="font-family:'Great Vibes',cursive;font-size:60px";></h2>

<div class="content">

<div class="text">

<p id="chapter3Text" style="font-size: 24px; line-height: 35px";></p>

</div>

<div class="image">

<img
id="storyImage2"
src="images/cat2.jpg">

</div>

</div>

<button id="chapter3Btn">

Keep Reading →

</button>

</div>

</section>

<!-- ========================================= -->
<!-- CHAPTER 4 (LESSON 11) -->
<!-- ========================================= -->

<section
id="chapter4"
class="chapter">
<div class="chapter-container">
<h2 id="chapter4Title" style="font-family:'Great Vibes',cursive;font-size:56px";></h2>
<div class="content">
<div class="text">
<p id="chapter4Text" style="font-size: 22px; line-height: 24px";></p>
</div>
<div class="image">
<img
id="storyImage3"
src="images/cat3.jpg">
</div>
</div>

<button id="chapter4Btn">

Turn the Page →

</button>

</div>

</section>

<!-- ========================================= -->
<!-- CHAPTER 5 -->
<!-- ========================================= -->

<section
id="chapter5"
class="chapter">

<div class="chapter-container">

<h2 id="chapter5Title"></h2>

<div class="content">

<div class="text" style="font-size:22px;line-height:24px">

<p id="chapter5Text" style="font-size:22px;"></p>

</div>

<div class="image">

<img
id="storyImage4"
src="images/favorites.png"
style="width:300px; height:auto";
>

</div>

</div>

<button id="chapter5Btn">

Turn the Page →

</button>

</div>

</section>

<!-- ========================================= -->
<!-- CHAPTER 6 (LESSON 13) -->
<!-- ========================================= -->

<section
id="chapter6"
class="chapter">

<div class="chapter-container">

<h2 id="chapter6Title">
Let's Celebrate You 🎉
</h2>

<p
id="chapter6Text"
style="
font-size:24px;
line-height:42px;
margin-top:20px;
margin-bottom:35px;
">

Every birthday deserves
a little magic.

Let's make this one
a little more special.

</p>


<!-- ========================================= -->
<!-- Celebration Stage -->
<!-- ========================================= -->

<div id="celebrationStage">

<!-- Fairy Lights -->
<div id="fairyLights"></div>

<!-- Decorations -->
<div id="decorations"></div>

<!-- Balloons -->
<div id="balloonContainer"></div>

<!-- Cake Area -->
<div id="cakeArea"></div>

<!-- Wish Text -->
<div id="wishArea"></div>

</div>


<!-- ========================================= -->
<!-- Main Action Button -->
<!-- ========================================= -->

<button id="celebrateBtn">

✨ Light the Celebration ✨

</button>

</div>

</section>

<!-- ========================================= -->
<!-- SCRIPT -->
<!-- ========================================= -->

<script src="script.js"></script>

</body>

</html>
